<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Breath Body and Soul — App színvariációk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#15140f;color:#fff;-webkit-font-smoothing:antialiased}
  .serif{font-family:'Cormorant Garamond',serif}

  /* intro */
  .intro{max-width:900px;margin:0 auto;padding:64px 24px 24px;text-align:center}
  .intro .ey{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#9ab98a;margin-bottom:14px}
  .intro h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(32px,6vw,52px);line-height:1.1;margin-bottom:14px}
  .intro p{font-weight:300;color:rgba(255,255,255,.55);max-width:560px;margin:0 auto;line-height:1.7;font-size:15px}

  /* shade section */
  .shade{background:var(--page-bg);color:var(--page-text);padding:54px 0 64px}
  .shade-head{max-width:1160px;margin:0 auto 34px;padding:0 28px}
  .shade-head h2{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(26px,4vw,38px);margin-bottom:4px}
  .shade-head p{font-size:13px;font-weight:300;opacity:.62;letter-spacing:.01em}
  .phones{display:flex;gap:26px;overflow-x:auto;padding:6px 28px 22px;scrollbar-width:none}
  .phones::-webkit-scrollbar{display:none}
  @media(min-width:1180px){ .phones{justify-content:center;overflow:visible} }

  /* phone frame */
  .phone{flex:0 0 auto;width:236px;height:496px;border-radius:40px;background:#000;padding:9px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.5), 0 8px 24px -8px rgba(0,0,0,.35);position:relative}
  .notch{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:64px;height:6px;border-radius:5px;background:rgba(255,255,255,.18);z-index:3}
  .screen{width:100%;height:100%;border-radius:32px;overflow:hidden;background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;position:relative}

  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:13px 20px 4px;font-size:11px;font-weight:600;color:var(--text);opacity:.9}
  .statusbar .dots{letter-spacing:1px;opacity:.7;font-size:9px}
  .scr-pad{flex:1;padding:14px 18px 8px;overflow:hidden;display:flex;flex-direction:column}
  .scr-pad.center{align-items:center;justify-content:center;text-align:center;gap:4px}
  .scr-h{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:26px;margin:6px 0 16px;color:var(--text)}
  .sec-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:16px 0 9px}

  .greet{font-size:13px;color:var(--muted);margin-top:4px}
  .greet-name{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:30px;color:var(--text);margin-bottom:16px}

  .hero-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:15px;display:flex;align-items:center;gap:12px}
  .hc-label{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:3px}
  .hc-title{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--text);line-height:1.1}
  .hc-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .play{margin-left:auto;width:38px;height:38px;flex:0 0 38px;border-radius:50%;background:var(--accent);color:var(--on-accent);
    display:flex;align-items:center;justify-content:center;font-size:13px;padding-left:2px}

  .stat-row{display:flex;gap:10px;margin-top:14px}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px 14px}
  .stat b{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:23px;color:var(--text);display:block;line-height:1}
  .stat span{font-size:10px;color:var(--muted);letter-spacing:.02em}

  .list-item,.prac{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px 14px;margin-bottom:9px}
  .li-ic,.pr-ic{width:34px;height:34px;flex:0 0 34px;border-radius:11px;background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:15px}
  .list-item p,.prac p{font-size:13px;color:var(--text);font-weight:500;line-height:1.2}
  .list-item span,.prac span{font-size:11px;color:var(--muted)}

  /* breathing screen */
  .breath-screen{background:var(--bg)}
  .b-phase{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:26px}
  .b-timer{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:34px;color:var(--text);margin-top:30px}
  .b-sub{font-size:11px;color:var(--muted);letter-spacing:.04em}
  .b-controls{padding:0 0 30px;display:flex;justify-content:center}
  .bc{width:50px;height:50px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:16px}

  .ring{position:relative;display:flex;align-items:center;justify-content:center}
  .ring.lg{width:150px;height:150px}
  .ring span{position:absolute;border-radius:50%;border:1.5px solid var(--accent)}
  .ring.lg span:nth-child(1){width:150px;height:150px;opacity:.25;animation:br 9s ease-in-out infinite}
  .ring.lg span:nth-child(2){width:108px;height:108px;opacity:.4;animation:br 9s ease-in-out infinite .15s}
  .ring.lg span:nth-child(3){width:66px;height:66px;opacity:.6;animation:br 9s ease-in-out infinite .3s}
  .ring.lg .core{position:absolute;width:30px;height:30px;border:none;background:var(--accent);opacity:.92;animation:brc 9s ease-in-out infinite}
  @keyframes br{0%,100%{transform:scale(.82)}48%,56%{transform:scale(1.12)}}
  @keyframes brc{0%,100%{transform:scale(.7);opacity:.55}48%,56%{transform:scale(1.05);opacity:1}}

  /* journal */
  .streak-card{background:var(--accent-soft);border:1px solid var(--border);border-radius:20px;padding:20px;text-align:center;margin-bottom:16px}
  .streak-card b{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:48px;color:var(--accent);line-height:1;display:block}
  .streak-card span{font-size:12px;color:var(--muted)}
  .week{display:flex;justify-content:space-between;gap:5px;margin-bottom:4px}
  .week i{flex:1;aspect-ratio:1;border-radius:9px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-style:normal;color:var(--muted)}
  .week i.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:600}
  .moods{display:flex;gap:9px;margin-top:4px}
  .moods span{flex:1;aspect-ratio:1;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted)}
  .moods span.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:600}

  .tabbar{display:flex;justify-content:space-around;align-items:center;padding:11px 8px 16px;border-top:1px solid var(--border);background:var(--bg)}
  .tabbar span{font-size:10px;color:var(--muted);letter-spacing:.02em}
  .tabbar span.on{color:var(--accent);font-weight:600}

  /* ===== THEMES ===== */
  .t-orig{ --page-bg:#0e1611; --page-text:#eef3ee;
    --bg:#0a1410; --surface:rgba(255,255,255,.05); --border:rgba(255,255,255,.1); --text:#fff; --muted:rgba(255,255,255,.5); --accent:#4cd77a; --accent-soft:rgba(76,215,122,.15); --on-accent:#0a1410; }
  .t-light{ --page-bg:#efe9df; --page-text:#34402f;
    --bg:#f3eee5; --surface:#ffffff; --border:rgba(40,55,40,.09); --text:#2c3a2c; --muted:rgba(44,58,44,.52); --accent:#5f7d57; --accent-soft:rgba(95,125,87,.15); --on-accent:#ffffff; }
  .t-sun{ --page-bg:#fdeedd; --page-text:#5b3a22;
    --bg:#fff4e8; --surface:#ffffff; --border:rgba(120,70,30,.1); --text:#5a3a22; --muted:rgba(90,58,34,.55); --accent:#ef8a44; --accent-soft:rgba(239,138,68,.16); --on-accent:#ffffff; }

  .foot{text-align:center;padding:40px 24px 60px;color:rgba(255,255,255,.4);font-size:12px;font-weight:300;background:#15140f}
</style>
</head>
<body>

<div class="intro">
  <p class="ey">Breath Body and Soul</p>
  <h1 class="serif">App — színvariációk</h1>
  <p>Három hangulat ugyanarra a koncepcióra, 4 képernyővel. Válaszd ki, melyik tetszik — utána azt finomítjuk. (Koncepció-mockup, nem végleges UI.)</p>
</div>

<main id="gallery"></main>

<div class="foot">Breath Body and Soul · app koncepció-mockupok</div>

<!-- 4 képernyő sablon, témánként klónozva -->
<template id="tpl">
  <div class="phones">

    <!-- 1 · MA -->
    <div class="phone"><div class="notch"></div><div class="screen">
      <div class="statusbar"><span>9:41</span><span class="dots">● ● ●  ▮</span></div>
      <div class="scr-pad">
        <p class="greet">Jó reggelt,</p>
        <p class="greet-name">Viki</p>
        <div class="hero-card">
          <div>
            <p class="hc-label">Mai gyakorlat</p>
            <p class="hc-title serif">Reggeli légzés</p>
            <p class="hc-sub">8 perc · aktiválás</p>
          </div>
          <div class="play">▶</div>
        </div>
        <div class="stat-row">
          <div class="stat"><b>12</b><span>napos sorozat</span></div>
          <div class="stat"><b>3,2 ó</b><span>összesen</span></div>
        </div>
        <p class="sec-label">Folytasd</p>
        <div class="list-item"><div class="li-ic">☾</div><div><p>Esti levezetés</p><span>10 perc</span></div></div>
      </div>
      <div class="tabbar"><span class="on">Ma</span><span>Légzés</span><span>Napló</span></div>
    </div></div>

    <!-- 2 · LÉGZÉS -->
    <div class="phone"><div class="notch"></div><div class="screen">
      <div class="statusbar"><span>9:41</span><span class="dots">● ● ●  ▮</span></div>
      <div class="scr-pad center">
        <p class="b-phase">Lélegezz be</p>
        <div class="ring lg"><span></span><span></span><span></span><span class="core"></span></div>
        <p class="b-timer">04:32</p>
        <p class="b-sub">Box légzés · 4 — 4 — 4 — 4</p>
      </div>
      <div class="b-controls"><div class="bc">❚❚</div></div>
    </div></div>

    <!-- 3 · GYAKORLATOK -->
    <div class="phone"><div class="notch"></div><div class="screen">
      <div class="statusbar"><span>9:41</span><span class="dots">● ● ●  ▮</span></div>
      <div class="scr-pad">
        <p class="scr-h serif">Gyakorlatok</p>
        <div class="prac"><div class="pr-ic">☀</div><div><p>Reggeli aktiválás</p><span>8 perc · energizáló</span></div></div>
        <div class="prac"><div class="pr-ic">◐</div><div><p>Szorongásoldó</p><span>12 perc · megnyugtató</span></div></div>
        <div class="prac"><div class="pr-ic">☾</div><div><p>Esti levezetés</p><span>10 perc · elalvás</span></div></div>
        <div class="prac"><div class="pr-ic">∿</div><div><p>Szomatikus oldás</p><span>15 perc · feszültség</span></div></div>
      </div>
      <div class="tabbar"><span>Ma</span><span class="on">Légzés</span><span>Napló</span></div>
    </div></div>

    <!-- 4 · NAPLÓ -->
    <div class="phone"><div class="notch"></div><div class="screen">
      <div class="statusbar"><span>9:41</span><span class="dots">● ● ●  ▮</span></div>
      <div class="scr-pad">
        <p class="scr-h serif">Naplóm</p>
        <div class="streak-card"><b>12</b><span>nap egymás után</span></div>
        <div class="week"><i class="on">H</i><i class="on">K</i><i class="on">Sz</i><i class="on">Cs</i><i class="on">P</i><i>Szo</i><i>V</i></div>
        <p class="sec-label">Hogy érzed magad?</p>
        <div class="moods"><span>Nyug.</span><span class="sel">Jó</span><span>Közö.</span><span>Fesz.</span></div>
      </div>
      <div class="tabbar"><span>Ma</span><span>Légzés</span><span class="on">Napló</span></div>
    </div></div>

  </div>
</template>

<script>
  var themes=[
    {cls:'t-orig',  label:'A — Eredeti',            note:'Sötétzöld, smaragd akcent — a mostani oldal app-szekciójának hangulata.'},
    {cls:'t-light', label:'B — Világos / natúr',    note:'Krém-fehér, zsályazöld akcent — a küldött fotó (fehér lenvászon, természetes fény) világa.'},
    {cls:'t-sun',   label:'C — Napsütéses / nyári', note:'Meleg barack-krém, narancs akcent — vidám, nyári, energizáló.'}
  ];
  var tpl=document.getElementById('tpl'), gal=document.getElementById('gallery');
  themes.forEach(function(t){
    var sec=document.createElement('section');
    sec.className='shade '+t.cls;
    var head=document.createElement('div');
    head.className='shade-head';
    head.innerHTML='<h2 class="serif"></h2><p></p>';
    head.querySelector('h2').textContent=t.label;
    head.querySelector('p').textContent=t.note;
    sec.appendChild(head);
    sec.appendChild(tpl.content.cloneNode(true));
    gal.appendChild(sec);
  });
</script>
</body>
</html>
